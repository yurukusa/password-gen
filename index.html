<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Secure Random Passwords</title>
<meta name="description" content="Generate secure random passwords. Customize length, characters, exclude ambiguous. Strength meter. Free.">
<meta property="og:title" content="Password Generator — Secure Random Passwords">
<meta property="og:description" content="Generate secure passwords. Custom length, strength meter. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/password-gen/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}

.pw-display{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;cursor:pointer;transition:border-color 0.2s}
.pw-display:hover{border-color:#3b82f6}
.pw-text{font-family:'Fira Code',monospace;font-size:1.4rem;color:#10b981;word-break:break-all;letter-spacing:1.5px;line-height:1.6}
.pw-hint{font-size:0.72rem;color:#555;margin-top:8px}

.strength-bar{height:6px;background:#222;border-radius:3px;margin-bottom:16px;overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:width 0.3s,background 0.3s}
.strength-label{text-align:center;font-size:0.78rem;margin-bottom:16px}

.options{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.opt-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.opt-row:last-child{margin-bottom:0}
.opt-row label{font-size:0.85rem;color:#888;min-width:100px;font-weight:600}
.opt-row input[type="range"]{flex:1;min-width:120px;accent-color:#3b82f6}
.range-val{font-family:'Fira Code',monospace;font-size:0.9rem;color:#4da6ff;min-width:30px;text-align:right}
.opt-row input[type="checkbox"]{accent-color:#3b82f6;width:16px;height:16px}
.check-label{font-size:0.82rem;color:#ccc;cursor:pointer;display:flex;align-items:center;gap:6px}

.btn-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:10px;border:1px solid #333;background:#161616;color:#888;font-size:0.85rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}

.bulk{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;margin-bottom:16px;max-height:200px;overflow:auto;cursor:pointer}
.bulk:hover{border-color:#3b82f6}
.bulk pre{font-family:'Fira Code',monospace;font-size:0.8rem;color:#ddd;white-space:pre-wrap}
.bulk .hint{font-size:0.72rem;color:#555;margin-top:6px}

.entropy{text-align:center;font-size:0.75rem;color:#444;margin-bottom:16px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
</style>
</head>
<body>
<div class="container">
<h1>Password Generator</h1>
<p class="subtitle">Generate cryptographically secure random passwords.</p>

<div class="pw-display" onclick="copyPw()">
  <div class="pw-text" id="pwText"></div>
  <div class="pw-hint">Click to copy</div>
</div>

<div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
<div class="strength-label" id="strengthLabel"></div>

<div class="options">
  <div class="opt-row">
    <label>Length</label>
    <input type="range" id="length" min="4" max="128" value="20" oninput="generate()">
    <span class="range-val" id="lengthVal">20</span>
  </div>
  <div class="opt-row">
    <label class="check-label"><input type="checkbox" id="upper" checked onchange="generate()"> Uppercase (A-Z)</label>
  </div>
  <div class="opt-row">
    <label class="check-label"><input type="checkbox" id="lower" checked onchange="generate()"> Lowercase (a-z)</label>
  </div>
  <div class="opt-row">
    <label class="check-label"><input type="checkbox" id="digits" checked onchange="generate()"> Numbers (0-9)</label>
  </div>
  <div class="opt-row">
    <label class="check-label"><input type="checkbox" id="symbols" checked onchange="generate()"> Symbols (!@#$%...)</label>
  </div>
  <div class="opt-row">
    <label class="check-label"><input type="checkbox" id="noAmbig" onchange="generate()"> Exclude ambiguous (0O1lI)</label>
  </div>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="generate()">Generate New</button>
  <button class="btn" onclick="copyPw()">Copy</button>
  <button class="btn" onclick="bulkGen()">Generate 10</button>
</div>

<div class="entropy" id="entropy"></div>

<div class="bulk" id="bulkSection" style="display:none" onclick="copyBulk()">
  <pre id="bulkOutput"></pre>
  <div class="hint">Click to copy all</div>
</div>

</div>

<footer>
  <a href="https://github.com/yurukusa/password-gen">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LOWER='abcdefghijklmnopqrstuvwxyz';
const DIGITS='0123456789';
const SYMBOLS='!@#$%^&*()_+-=[]{}|;:,.<>?';
const AMBIGUOUS='0O1lI';

function getCharset(){
  let chars='';
  if(document.getElementById('upper').checked)chars+=UPPER;
  if(document.getElementById('lower').checked)chars+=LOWER;
  if(document.getElementById('digits').checked)chars+=DIGITS;
  if(document.getElementById('symbols').checked)chars+=SYMBOLS;
  if(!chars)chars=LOWER; // fallback
  if(document.getElementById('noAmbig').checked){
    chars=[...chars].filter(c=>!AMBIGUOUS.includes(c)).join('');
  }
  return chars;
}

function genPassword(len,charset){
  const arr=crypto.getRandomValues(new Uint32Array(len));
  return Array.from(arr,v=>charset[v%charset.length]).join('');
}

function generate(){
  const len=+document.getElementById('length').value;
  document.getElementById('lengthVal').textContent=len;
  const charset=getCharset();
  const pw=genPassword(len,charset);
  document.getElementById('pwText').textContent=pw;

  // Strength
  const entropy=Math.log2(charset.length)*len;
  let strength,color,pct;
  if(entropy<28){strength='Very Weak';color='#ef4444';pct=15}
  else if(entropy<36){strength='Weak';color='#fb923c';pct=30}
  else if(entropy<60){strength='Fair';color='#facc15';pct=50}
  else if(entropy<80){strength='Strong';color='#84cc16';pct=75}
  else{strength='Very Strong';color='#10b981';pct=100}

  const fill=document.getElementById('strengthFill');
  fill.style.width=pct+'%';
  fill.style.background=color;
  document.getElementById('strengthLabel').innerHTML=`<span style="color:${color}">${strength}</span>`;
  document.getElementById('entropy').textContent=`${Math.round(entropy)} bits of entropy · ${charset.length} possible characters`;
}

function copyPw(){
  const pw=document.getElementById('pwText').textContent;
  if(pw){navigator.clipboard.writeText(pw);toast('Password Copied!')}
}

function bulkGen(){
  const len=+document.getElementById('length').value;
  const charset=getCharset();
  const pws=[];
  for(let i=0;i<10;i++)pws.push(genPassword(len,charset));
  document.getElementById('bulkOutput').textContent=pws.join('\n');
  document.getElementById('bulkSection').style.display='block';
}

function copyBulk(){
  navigator.clipboard.writeText(document.getElementById('bulkOutput').textContent);
  toast('All Passwords Copied!');
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

generate();
</script>
</body>
</html>
